<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KMK 재무전략센터</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f3f6fa;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 38px 24px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      color: #123d73;
      font-size: 32px;
    }

    
    h2 {
      margin: 0 0 28px;
      color: #198754;
      font-size: 21px;
    }

    .intro {
      margin: 20px 0;
      padding: 22px;
      background: #f7f9fc;
      border-radius: 14px;
      line-height: 1.9;
      font-size: 17px;
    }

    .name {
      margin-top: 28px;
      font-size: 22px;
      font-weight: bold;
    }

    .area {
      margin-top: 8px;
      color: #666;
      font-size: 17px;
    }

    .message {
      margin-top: 30px;
      color: #555;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>KMK 재무전략센터</h1>

    <h2>보험 · 기업경영컨설팅</h2>

    <div class="intro">
      기업승계 · CEO플랜<br>
      법인컨설팅 · 절세전략<br>
      기업보험 · 개인재무설계
    </div>

    <div class="name">대표 권민경</div>

    <div class="area">천안 · 아산</div>

    <div class="message">
      기업과 대표님의 안정적인 미래를 위해<br>
      전문적인 재무전략을 함께 설계합니다.
    </div>

  </div>
</body>
</html>
